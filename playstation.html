<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0B0B0D">
<title>Fox Gaming Center — ألف مبروك 🎉</title>
<meta property="og:title" content="ألف مبروك! ربحت جائزة من Fox Gaming Center 🦊">
<meta property="og:description" content="امسح الباركود واستلم جائزتك">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --orange:#FF4E00;
  --orange-2:#FF7A33;
  --black:#0B0B0D;
  --panel:#141418;
  --panel-2:#1c1c22;
  --white:#ffffff;
  --muted:#9a9aa5;
  --line:rgba(255,255,255,.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Tajawal',system-ui,-apple-system,'Segoe UI',sans-serif;
  background:var(--black);
  color:var(--white);
  overflow-x:hidden;
  min-height:100%;
  position:relative;
}
/* background fx */
.bg{position:fixed;inset:0;z-index:0;overflow:hidden}
.bg::before{
  content:"";position:absolute;inset:0;
  background:
    radial-gradient(60% 45% at 50% 0%, rgba(255,78,0,.28), transparent 70%),
    radial-gradient(45% 40% at 85% 100%, rgba(255,78,0,.14), transparent 70%),
    radial-gradient(40% 40% at 10% 90%, rgba(255,122,51,.10), transparent 70%);
}
.bg::after{
  content:"";position:absolute;inset:0;opacity:.5;
  background-image:
    linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px);
  background-size:44px 44px;
  mask-image:radial-gradient(70% 60% at 50% 30%,#000,transparent 85%);
  -webkit-mask-image:radial-gradient(70% 60% at 50% 30%,#000,transparent 85%);
}
canvas.confetti{position:fixed;inset:0;z-index:5;pointer-events:none}

.wrap{
  position:relative;z-index:10;
  max-width:520px;margin:0 auto;
  padding:26px 20px 40px;
  display:flex;flex-direction:column;align-items:center;
  min-height:100dvh;
}

/* returning banner */
.returning{
  width:100%;display:none;align-items:center;gap:10px;
  background:linear-gradient(90deg,rgba(255,78,0,.16),rgba(255,78,0,.04));
  border:1px solid rgba(255,78,0,.35);
  color:#ffd9c6;border-radius:14px;padding:11px 14px;margin-bottom:16px;
  font-size:14px;font-weight:700;
  animation:fade .5s ease both;
}
.returning.show{display:flex}

.logo{width:96px;height:auto;margin:6px 0 14px;filter:drop-shadow(0 8px 24px rgba(255,78,0,.35));animation:pop .7s cubic-bezier(.2,.9,.3,1.4) both}
.brandname{font-weight:900;letter-spacing:.5px;font-size:15px;color:var(--muted);margin-bottom:26px;text-transform:uppercase}
.brandname b{color:#fff}

.mabrook{
  font-size:clamp(40px,14vw,64px);font-weight:900;line-height:1;
  background:linear-gradient(180deg,#fff, #ffd9c6);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  text-shadow:0 4px 40px rgba(255,78,0,.25);
  animation:pop .6s .1s cubic-bezier(.2,.9,.3,1.4) both;
}
.sub{font-size:19px;font-weight:700;color:var(--white);margin-top:12px;opacity:.9;animation:fade .6s .25s both}

/* prize card */
.card{
  width:100%;margin-top:24px;border-radius:24px;
  background:linear-gradient(180deg,var(--panel),var(--panel-2));
  border:1px solid var(--line);
  box-shadow:0 30px 80px -30px rgba(0,0,0,.9), inset 0 1px 0 rgba(255,255,255,.05);
  overflow:hidden;position:relative;
  animation:rise .7s .3s cubic-bezier(.2,.8,.2,1) both;
}
.card::before{content:"";position:absolute;inset:0;border-radius:24px;padding:1px;
  background:linear-gradient(180deg,rgba(255,78,0,.6),transparent 40%);
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
.ribbon{
  background:linear-gradient(90deg,var(--orange),var(--orange-2));
  color:#fff;font-weight:900;font-size:13px;letter-spacing:1px;
  text-align:center;padding:9px;text-transform:uppercase;
}
.card-in{padding:26px 22px 24px;text-align:center}
.prize-icon{font-size:56px;line-height:1;filter:drop-shadow(0 6px 18px rgba(255,78,0,.4));animation:pop .6s .5s cubic-bezier(.2,.9,.3,1.4) both}
.prize-name{
  font-size:clamp(26px,8vw,34px);font-weight:900;margin-top:12px;
  color:#fff;
}
.prize-name .accent{color:var(--orange)}
.prize-desc{color:var(--muted);font-size:15px;font-weight:500;margin-top:10px;line-height:1.6}

/* code chip */
.code-box{margin-top:20px;background:#0d0d10;border:1px dashed rgba(255,78,0,.4);border-radius:14px;padding:12px 14px}
.code-box .lbl{font-size:12px;color:var(--muted);font-weight:700;margin-bottom:4px}
.code{font-size:24px;font-weight:900;letter-spacing:3px;color:#fff;font-family:'Tajawal',monospace}
.code small{display:block;font-size:11px;color:var(--muted);letter-spacing:0;font-weight:500;margin-top:6px}

/* buttons */
.actions{width:100%;margin-top:22px;display:flex;flex-direction:column;gap:12px;animation:fade .6s .55s both}
.btn{
  display:flex;align-items:center;justify-content:center;gap:9px;
  width:100%;border:0;cursor:pointer;border-radius:16px;
  font-family:inherit;font-weight:800;font-size:17px;padding:16px;
  transition:transform .12s ease, box-shadow .2s ease, background .2s;
}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(90deg,var(--orange),var(--orange-2));color:#fff;box-shadow:0 14px 34px -12px rgba(255,78,0,.8)}
.btn-ghost{background:var(--panel-2);color:#fff;border:1px solid var(--line)}
.btn svg{width:22px;height:22px}
.mark-used{background:none;border:0;color:var(--muted);font-family:inherit;font-weight:700;font-size:14px;cursor:pointer;margin-top:14px;text-decoration:underline;text-underline-offset:3px}

/* used state */
.used-badge{display:none;margin-top:16px;align-items:center;justify-content:center;gap:8px;color:#7bd88f;font-weight:800;font-size:16px}
.used-badge.show{display:flex}
body.is-used .card{filter:grayscale(.6);opacity:.75}
body.is-used .actions .btn-primary{filter:grayscale(1);opacity:.6;pointer-events:none}

.expiry{color:var(--muted);font-size:13px;font-weight:500;margin-top:18px;text-align:center}
.foot{margin-top:26px;text-align:center;color:var(--muted);font-size:12px;line-height:1.8}
.foot b{color:#cfcfd6}

/* toast */
.toast{
  position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
  background:#fff;color:#111;font-weight:800;font-size:14px;
  padding:12px 18px;border-radius:999px;z-index:60;opacity:0;pointer-events:none;
  box-shadow:0 16px 40px rgba(0,0,0,.4);transition:.3s;white-space:nowrap
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@keyframes pop{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
@keyframes rise{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:translateY(0)}}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

// اختيار الجائزة من الرابط ?p=1 ... ?p=5
const params = new URLSearchParams(location.search);
let pid = (window.FORCED_PID) || params.get('p') || params.get('prize') || '1';
if(!CONFIG.prizes[pid]) pid = '1';
const prize = CONFIG.prizes[pid];

document.getElementById('prizeIcon').textContent = prize.icon;
document.getElementById('prizeName').innerHTML = '<span class="accent">'+prize.name+'</span>';
document.getElementById('prizeDesc').textContent = prize.desc;
document.querySelector('.sub').textContent = 'ربحت وياناـ ' + prize.name;
document.title = 'ألف مبروك — ربحت ' + prize.name + ' 🎉';

/* ------- الحفظ بجهاز الزبون (تذكير) ------- */
const STORE_KEY = 'fox_prizes_v1';
function load(){ try{ return JSON.parse(localStorage.getItem(STORE_KEY)||'{}'); }catch(e){ return {}; } }
function save(d){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(d)); }catch(e){} }
function randCode(){ const s='ABCDEFGHJKMNPQRSTUVWXYZ23456789'; let r=''; for(let i=0;i<4;i++) r+=s[Math.floor(Math.random()*s.length)]; return r; }

let db = load();
let rec = db[pid];
const firstTime = !rec;
if(!rec){
  rec = { code: 'FOX-'+pid+'-'+randCode(), savedAt: Date.now(), used:false };
  db[pid] = rec; save(db);
}

// عرض الكود
document.getElementById('code').innerHTML = rec.code + '<small>اعرض هذا الكود عند الكاونتر لاستلام جائزتك</small>';

// تاريخ الانتهاء
const exp = new Date(rec.savedAt + CONFIG.expiryDays*86400000);
const days = Math.max(0, Math.ceil((exp - Date.now())/86400000));
document.getElementById('expiry').textContent = '⏳ صالحة لمدة ' + CONFIG.expiryDays + ' يوم · تنتهي ' + exp.toLocaleDateString('ar-EG',{day:'numeric',month:'long'});

// حالة مستخدمة / لافتة الرجوع
function applyUsed(){
  if(rec.used){
    document.body.classList.add('is-used');
    document.getElementById('usedBadge').classList.add('show');
    document.getElementById('usedBtn').textContent = 'إلغاء التعليم';
    document.getElementById('ribbon').textContent = '✅ تم الاستلام';
  }else{
    document.body.classList.remove('is-used');
    document.getElementById('usedBadge').classList.remove('show');
    document.getElementById('usedBtn').textContent = 'علّمها مستخدمة';
    document.getElementById('ribbon').textContent = '🏆 جائزتك';
  }
}
applyUsed();
// إذا رجع لنفس الجائزة (مو أول مرة) وما استخدمها → ذكّره
if(!firstTime && !rec.used){ document.getElementById('returning').classList.add('show'); }

/* ------- الأزرار ------- */

/* ------- تذكير بالتقويم (.ics) — يشتغل على أي جوال ------- */
function pad(n){return String(n).padStart(2,'0')}
function fmt(d){return d.getUTCFullYear()+pad(d.getUTCMonth()+1)+pad(d.getUTCDate())+'T'+pad(d.getUTCHours())+pad(d.getUTCMinutes())+'00Z'}
function downloadICS(){
  const start = new Date(Date.now()+2*86400000); start.setHours(18,0,0,0);
  const end = new Date(start.getTime()+3600000);
  const lines = [
    'BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//FoxGaming//Prize//AR','CALSCALE:GREGORIAN','BEGIN:VEVENT',
    'UID:'+rec.code+'@foxgaming',
    'DTSTAMP:'+fmt(new Date()),
    'DTSTART:'+fmt(start),'DTEND:'+fmt(end),
    'SUMMARY:🦊 استخدم جائزتك: '+prize.name+' — '+CONFIG.brand,
    'DESCRIPTION:كودك '+rec.code+' · اعرضه عند الكاونتر. الجائزة تنتهي '+exp.toLocaleDateString('ar-EG'),
    'LOCATION:'+CONFIG.brand,
    'BEGIN:VALARM','TRIGGER:-PT1H','ACTION:DISPLAY','DESCRIPTION:تذكير جائزتك من Fox','END:VALARM',
    'END:VEVENT','END:VCALENDAR'
  ];
  const blob = new Blob([lines.join('\r\n')],{type:'text/calendar'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='Fox-Prize-'+rec.code+'.ics'; document.body.appendChild(a); a.click(); a.remove();
}

/* ------- Toast ------- */
let tT;
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(tT); tT=setTimeout(()=>t.classList.remove('show'),2600);
}

/* ------- Confetti ------- */
(function(){
  const c=document.querySelector('.confetti'), x=c.getContext('2d');
  let W,H,parts=[]; const colors=['#FF4E00','#FF7A33','#ffffff','#ffd9c6'];
  function size(){W=c.width=innerWidth;H=c.height=innerHeight}
  size(); addEventListener('resize',size);
  for(let i=0;i<130;i++) parts.push({
    x:Math.random()*W, y:Math.random()*-H, r:6+Math.random()*8,
    c:colors[i%colors.length], s:2+Math.random()*4, a:Math.random()*6,
    va:(-.1+Math.random()*.2), vy:2+Math.random()*3.5, tilt:Math.random()*Math.PI
  });
  let t0=Date.now();
  (function loop(){
    x.clearRect(0,0,W,H);
    let alive=false;
    for(const p of parts){
      p.y+=p.vy; p.x+=Math.sin(p.tilt+p.y*0.02)*1.4; p.a+=p.va; p.tilt+=0.02;
      if(p.y<H+20) alive=true;
      x.save(); x.translate(p.x,p.y); x.rotate(p.a);
      x.fillStyle=p.c; x.fillRect(-p.r/2,-p.r/2,p.r,p.r*0.6); x.restore();
    }
    if(alive && Date.now()-t0<5200) requestAnimationFrame(loop);
    else x.clearRect(0,0,W,H);
  })();
})();
</script>
